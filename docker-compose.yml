version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: astra-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - SECRET_KEY=django-insecure-prod-key-for-astra-technologies-website
      - ALLOWED_HOSTS=*
    volumes:
      - backend_static:/app/staticfiles
      - backend_data:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: astra-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend_static:
  backend_data:
